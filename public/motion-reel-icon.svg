<svg width="200" height="200" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      .film-reel {
        animation: spin 4s linear infinite;
        transform-origin: center;
      }
    </style>
    <linearGradient id="reelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #3B82F6; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #1E40AF; stop-opacity: 1" />
    </linearGradient>
    <linearGradient id="filmGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #60A5FA; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #3B82F6; stop-opacity: 1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1F2937" opacity="0.5"/>

  <!-- Outer reel - larger circle -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#reelGradient)" stroke-width="2" class="film-reel" />

  <!-- Reel teeth/segments -->
  <g stroke="url(#reelGradient)" stroke-width="1.5" class="film-reel">
    <line x1="32" y1="4" x2="32" y2="10" />
    <line x1="49.2" y1="6.8" x2="53.7" y2="11.3" />
    <line x1="60" y1="18" x2="54" y2="24" />
    <line x1="60" y1="32" x2="54" y2="32" />
    <line x1="60" y1="46" x2="54" y2="40" />
    <line x1="49.2" y1="57.2" x2="53.7" y2="52.7" />
    <line x1="32" y1="60" x2="32" y2="54" />
    <line x1="14.8" y1="57.2" x2="10.3" y2="52.7" />
    <line x1="4" y1="46" x2="10" y2="40" />
    <line x1="4" y1="32" x2="10" y2="32" />
    <line x1="4" y1="18" x2="10" y2="24" />
    <line x1="14.8" y1="6.8" x2="10.3" y2="11.3" />
  </g>

  <!-- Film strip effect - inner bands -->
  <g fill="url(#filmGradient)" opacity="0.8">
    <rect x="24" y="18" width="16" height="3" rx="1" />
    <rect x="24" y="28" width="16" height="3" rx="1" />
    <rect x="24" y="38" width="16" height="3" rx="1" />
    <rect x="24" y="48" width="16" height="3" rx="1" />
  </g>

  <!-- Center core circle -->
  <circle cx="32" cy="32" r="8" fill="url(#reelGradient)" />
  <circle cx="32" cy="32" r="5" fill="rgba(255, 255, 255, 0.2)" />

  <!-- Motion lines - animated -->
  <g stroke="url(#reelGradient)" stroke-width="1.5" opacity="0.6" style="animation: pulse 2s ease-in-out infinite;">
    <path d="M 44 24 Q 48 28 44 32" fill="none" stroke-linecap="round" />
    <path d="M 44 40 Q 48 36 44 32" fill="none" stroke-linecap="round" />
  </g>

  <!-- Accent dots -->
  <circle cx="32" cy="14" r="1.5" fill="#60A5FA" />
  <circle cx="50" cy="32" r="1.5" fill="#60A5FA" />
  <circle cx="32" cy="50" r="1.5" fill="#60A5FA" />
  <circle cx="14" cy="32" r="1.5" fill="#60A5FA" />
</svg>
